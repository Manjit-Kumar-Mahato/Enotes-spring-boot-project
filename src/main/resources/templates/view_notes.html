<!DOCTYPE html>
<html lang="en" xmlns:th="www.thymeleaf.org"
	th:replace="~{ base :: layout(~{::title} , ~{::section} ) }">
<head>
<meta charset="ISO-8859-1">
<title>View Notes</title>
</head>
<body>
	<section>
		<div class="container-fluid p-2">
			<h4 class="text-center">View All Notes</h4>
			<div class="row">

				<div class="col-md-10 offset-md-1 mt-2" th:each="n:${notes}">

					<div class="card">

						<div class="card-body">

							<div class="text-center">
								<i class="fa-solid fa-book fa-2x"></i>
							</div>

							<p>
								<b>[[${n.title}]]</b>
							</p>

							<p>[[${n.description}]]</p>

							<p>Publish Date : [[${n.date}]]</p>

							<div class="text-center">

								<a th:href="@{/user/editNotes/{id}(id=${n.id})}"
									class="btn btn-primary btn-sm"> Edit </a> <a
									th:href="@{/user/deleteNote/{id}(id=${n.id})}"
									class="btn btn-danger btn-sm"> Delete </a>

							</div>

						</div>

					</div>

				</div>

			</div>
			<div class="row mt-3">
				<div class="col-md-4 offset-md-1 text-right p-3">
					<p class="fw-bold">Total Notes : [[${totalItems}]]</p>
				</div>
				<div class="col-md-5">
					<nav>
						<ul class="pagination justify-content-center">

							<!-- Previous -->
							<li class="page-item" th:if="${currentPage > 0}"><a
								class="page-link"
								th:href="@{/user/viewNotes(page=${currentPage-1})}"> &laquo;
							</a></li>

							<!-- Page Numbers -->
							<li class="page-item"
								th:each="i : ${#numbers.sequence(0,totalPages-1)}"><a
								class="page-link" th:text="${i+1}"
								th:href="@{/user/viewNotes(page=${i})}"> </a></li>

							<!-- Next -->
							<li class="page-item" th:if="${currentPage < totalPages-1}">
								<a class="page-link"
								th:href="@{/user/viewNotes(page=${currentPage+1})}"> &raquo;
							</a>
							</li>

						</ul>
					</nav>
				</div>
			</div>
		</div>

	</section>
</body>
</html>
